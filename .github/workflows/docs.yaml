name: Modules Documentation

on:
  push:
    paths:
      - 'modules/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  docs:
    name: Build docs and commit
    runs-on: ubuntu-latest-arm

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Nix
      uses: cachix/install-nix-action@v30

    - name: Build docs
      run: |
        nix build .#docs 2>&1

    - name: Copy result
      run: | 
        cp result options.md
        rm result

    - name: Commit
      uses: EndBug/add-and-commit@v9
      with:
        author_name: puddle
        author_email: puddle@git.iw2tryhard.dev
        push: true
        message: 'chore: update docs (automated)'

