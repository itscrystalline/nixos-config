name: Check configuration

on:
  push:

jobs:
  check:
    name: Check config 
    runs-on: ubuntu-latest

    steps:
    - name: Cancel all previous runs
      uses: pierreraffa/cancel-previous-runs-action@1.11

    - name: Checkout code
      uses: actions/checkout@v4

#    - name: Set up Tailscale
#      uses: tailscale/github-action@v4
#      with:
#        oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
#        oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
#        tags: tag:ci

    - name: Set up post build hook
      run: |
        cat > /tmp/post-build-hook.sh << EOF
        set -euf
        if [ -n "$OUT_PATHS" ]; then
          echo "Uploading paths" $OUT_PATHS
          NIX_SSHOPTS="-o StrictHostKeyChecking=no" nix copy --to "ssh://nixremote@mingzhu" $OUT_PATHS
        fi
        EOF
        chmod +x /tmp/post-build-hook.sh
    - name: Install Nix
      uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-25.11
        extra_nix_config: |
          extra-substituters = http://cache.crys
          extra-trusted-public-keys = mingzhu:V0KsUipFnrBNsfUD8VI0rFXQpgE3KKJfRby9Jm8cLTQ=
          fallback = true
          post-build-hook = /tmp/post-build-hook.sh

    - name: Check
      run: |
        nix flake check --all-systems 2>&1

