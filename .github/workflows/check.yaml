name: Check configuration

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check-x86_64-linux:
    name: "Check config for x86_64-linux -> ${{ matrix.config }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        config: ["emily", "jocelyn"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up post build hook
      run: |
        cat > /tmp/post-build-hook.sh << EOF
        set -euf
        if [ -n "$OUT_PATHS" ]; then
          echo "Uploading paths" $OUT_PATHS
          NIX_SSHOPTS="-o StrictHostKeyChecking=no" nix copy --to "ssh://nixremote@mingzhu" $OUT_PATHS
        fi
        EOF
        chmod +x /tmp/post-build-hook.sh
    - name: Install Nix
      uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-25.11
        extra_nix_config: |
          extra-substituters = http://cache.crys
          extra-trusted-public-keys = mingzhu:V0KsUipFnrBNsfUD8VI0rFXQpgE3KKJfRby9Jm8cLTQ=
          fallback = true
          post-build-hook = /tmp/post-build-hook.sh

    - name: Check
      run: |
        nix build .#nixosConfigurations.${{ matrix.config }}.config.system.build.toplevel --dry-run 2>&1

  check-aarch64-linux:
    name: "Check config for aarch64-linux -> ${{ matrix.config }}"
    runs-on: ubuntu-latest-arm
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        config: ["raine", "liriel", "mingzhu"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up post build hook
      run: |
        cat > /tmp/post-build-hook.sh << EOF
        set -euf
        if [ -n "$OUT_PATHS" ]; then
          echo "Uploading paths" $OUT_PATHS
          NIX_SSHOPTS="-o StrictHostKeyChecking=no" nix copy --to "ssh://nixremote@mingzhu" $OUT_PATHS
        fi
        EOF
        chmod +x /tmp/post-build-hook.sh
    - name: Install Nix
      uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-25.11
        extra_nix_config: |
          extra-substituters = http://cache.crys
          extra-trusted-public-keys = mingzhu:V0KsUipFnrBNsfUD8VI0rFXQpgE3KKJfRby9Jm8cLTQ=
          fallback = true
          post-build-hook = /tmp/post-build-hook.sh

    - name: Check
      run: |
        nix build .#nixosConfigurations.${{ matrix.config }}.config.system.build.toplevel --dry-run 2>&1

  auto-merge:
    needs: [check-x86_64-linux, check-aarch64-linux]
    runs-on: ubuntu-latest-arm
    if: contains(github.event.pull_request.labels.*.name, 'automated')
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Set up forgejo CLI
        run: |
          sudo apt install forgejo-cli
          fj -H https://git.iw2tryhard.dev auth add-key itscrystalline ${{ secrets.FORGEJO_TOKEN }}

      - name: Merge
        run: fj -H git.iw2tryhard.dev pr merge -M merge -d ${{ github.event.pull_request.head.repo.full_name }}#${{ github.event.pull_request.number }}


