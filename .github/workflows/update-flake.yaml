name: Update flake inputs

on:
  schedule:
    - cron: "0 5 * * *"  # 12AM UTC+7
  workflow_dispatch:
    inputs:
      auto-merge:
        type: boolean
        description: set the PR created to auto-merge.
        default: true
      just_cache:
        type: boolean
        description: don't update, just cache.
        default: false 

jobs:
  update:
    name: Update flake
    runs-on: ubuntu-latest-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with: 
          token: ${{ secrets.PUDDLE_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-26.05
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GH_TOKEN }}

      - name: Update flake.lock
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.just-cache == 'false'
        id: update
        run: |
          nix flake update 2> >(tee /dev/stderr) | awk '
            /^• Updated input/ {in_update = 1; print; next}
            in_update && !/^warning:/ {print}
            /^$/ {in_update = 0}
          ' > update.log

          echo "UPDATE_LOG<<EOF" >> $GITHUB_ENV
          cat update.log >> $GITHUB_ENV 
          echo "EOF" >> $GITHUB_ENV

          rm update.log

      - name: Write PR body template
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.just-cache == 'false'
        uses: https://github.com/DamianReeves/write-file-action@v1.3
        with:
          path: pr_body.template
          contents: |
            automatically updated:

            ```
            ${{ env.UPDATE_LOG }}
            ```

      - name: Generate PR body
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.just-cache == 'false'
        uses: pedrolamas/handlebars-action@v2.4.0 # v2.4.0
        with:
          files: "pr_body.template"
          output-filename: "pr_body.md"
      - name: Save PR body
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.just-cache == 'false'
        id: pr_body
        uses: juliangruber/read-file-action@v1
        with:
          path: "pr_body.md"

      - name: Remove temporary files
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.just-cache == 'false'
        run: |
          rm pr_body.template
          rm pr_body.md

      - name: Commit to new branch
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.just-cache == 'false'
        uses: EndBug/add-and-commit@v10 
        id: commit
        with:
          author_name: puddle
          author_email: puddle@git.iw2tryhard.dev
          message: |
            automated: Update `flake.lock`

            ${{ steps.pr_body.outputs.content }}
          new_branch: update-flake-lock 

      - name: Create Pull Request
        id: create-pr
        if: steps.commit.outputs.committed == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.just-cache == 'false')
        env:
          TOKEN: ${{ secrets.PUDDLE_TOKEN }}
          FORGEJO_SERVER_URL: ${{ forgejo.server_url }}
          REPO: ${{ forgejo.repository }}
          DESC: ${{ steps.pr_body.outputs.content }}
        run: |
          jq -n \
            --arg body "$DESC" \
            '{base: "main", body: $body, head: "update-flake-lock", title: "chore: Update flake (automated)"}' \
          | curl -X POST -s --fail \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: applocation/json" \
            --data-binary @- \
            "$FORGEJO_SERVER_URL/api/v1/repos/$REPO/pulls" \
          | jq ".number" > pr

          echo -n "pr=$(cat pr)" >> $FORGEJO_OUTPUT

      - name: Enable automatic merge
        if: steps.create-pr.outputs.pr > 0 && (github.event_name != 'workflow_dispatch' || (github.event.inputs.auto-merge == 'true' && github.event.inputs.just-cache == 'false'))
        id: auto-merge
        env:
          TOKEN: ${{ secrets.PUDDLE_TOKEN }}
          FORGEJO_SERVER_URL: ${{ forgejo.server_url }}
          REPO: ${{ forgejo.repository }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pr }}
          PAYLOAD: |
            {
              "Do": "merge",
              "delete_branch_after_merge": true,
              "merge_when_checks_succeed": true,
              "force_merge": false
            }
        run: |
          curl --fail -s -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$FORGEJO_SERVER_URL/api/v1/repos/$REPO/pulls/$PR_NUMBER/merge"

      - name: PR number
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.just-cache == 'false'
        run: echo 'PR ${{ steps.create-pr.outputs.pr }}'

  wake-up-emily:
    name: Wake up emily
    runs-on: ubuntu-latest-arm
    needs: update

    steps:
      - name: Call HA webhook
        run: curl -X PUT http://dorm.crys/api/webhook/${{ secrets.EMILY_WAKE }}

  cache:
    runs-on: ${{ matrix.pair.runner }}
    name: Build & cache ${{ matrix.pair.arch }} packages
    needs: wake-up-emily
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        pair:
          - arch: x86_64-linux
            runner: ubuntu-latest
          - arch: aarch64-linux
            runner: ubuntu-latest-arm

    steps:
      - name: Checkout code (on updated branch)
        id: checkout-updated
        uses: actions/checkout@v4
        with: 
          ref: update-flake-lock
      - name: Checkout code (on main branch)
        if: failure() && steps.checkout-updated.outcome == 'failure'
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-26.05
          extra_nix_config: |
            substituters = http://cache.crys
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= nixpkgs-python.cachix.org-1:hxjI7pFxTyuTHn2NkvWCrAUcNZLNS3ZAvfYNuYifcEU= cache.nixos-cuda.org:74DUi4Ye579gUqzH4ziL9IyiJBlDpMRn9MBN8oNan9M= lantian:EeAUQ+W+6r7EtwnmYjeVwx5kOGEBpjlBfPlzGlTNvHc= niri.cachix.org-1:Wv0OmO7PsuocRKzfDoJ3mulSl7Z6oezYhGhR+3W2964= itscrystalline.cachix.org-1:w+aEu6k5Rx3xgUSJPCUhdZSxS919ZJvv9wThPKGVMv4= vicinae.cachix.org-1:1kDrfienkGHPYbkpNj1mWTr7Fm1+zcenzgTizIcI3oc= noctalia.cachix.org-1:pCOR47nnMEo5thcxNDtzWpOxNFQsBRglJzxWPp3dkU4= harmonia.cache.crys:5IjKpw7rA9DxB2BVvDY/NzD0Zakjn9t9SB40AEpY2Q8=

      - name: Install remote store SSH key
        run: |
          echo ${{ secrets.MINGZHU_PRIVKEY_NIXREMOTE_BASE64 }} | base64 --decode > /tmp/nixremote
          chmod 400 /tmp/nixremote
          wc /tmp/nixremote

      - name: Build & Upload 
        run: |
          mapfile -t pkgs < <(nix eval .#packages.${{ matrix.pair.arch }} --apply 'ps: builtins.filter (p: p != "docs") (builtins.attrNames ps)' --json | jq -r '.[]')
          installables=("${pkgs[@]/#/.#packages.${{ matrix.pair.arch }}.}")
          missing=()
          for installable in "${installables[@]}"; do
            path=$(nix eval "$installable.outPath" --raw)
            nix path-info --store http://cache.crys "$path" &>/dev/null || missing+=("$installable")
          done
          echo "missing from cache: ${missing[@]}"

          if [ "${{ matrix.pair.arch }}" = "x86_64-linux" ]; then
            build_opts=(--option max-jobs $(($(nproc) / 2)) --option cores $(($(nproc) / 2)))
          else
            build_opts=()
          fi

          to_build=("${missing[@]}")
          failed=()

          for round in 1 2 3; do
            [ ${#to_build[@]} -eq 0 ] && break
            echo "=== round $round: ${#to_build[@]} package(s) to build ==="
            failed=()
            for installable in "${to_build[@]}"; do
              echo "building: $installable"
              if nix build "$installable" --no-link --print-build-logs "${build_opts[@]}"; then
                NIX_SSHOPTS="-o StrictHostKeyChecking=no -i /tmp/nixremote" nix copy \
                  --to "ssh://nixremote@mingzhu" "$installable"
              else
                echo "failed: $installable"
                failed+=("$installable")
              fi
            done
            to_build=("${failed[@]}")
          done

          if [ ${#failed[@]} -gt 0 ]; then
            echo "still failing after 3 rounds: ${failed[@]}"
            exit 1
          fi

