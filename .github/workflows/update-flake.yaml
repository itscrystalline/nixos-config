name: Update flake inputs

on:
  schedule:
    - cron: "0 5 * * *"  # 12AM UTC+7
  workflow_dispatch:

jobs:
  update:
    name: Update flake    
    runs-on: ubuntu-latest-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-25.11
          extra_nix_config: |
            extra-substituters = http://cache.crys
            extra-trusted-public-keys = mingzhu:V0KsUipFnrBNsfUD8VI0rFXQpgE3KKJfRby9Jm8cLTQ=
            fallback = true

      - name: Update flake.lock
        id: update
        run: |
          nix flake update 2> >(tee /dev/stderr) | awk '
            /^• Updated input/ {in_update = 1; print; next}
            in_update && !/^warning:/ {print}
            /^$/ {in_update = 0}
          ' > update.log

          echo "UPDATE_LOG<<EOF" >> $GITHUB_ENV
          cat update.log >> $GITHUB_ENV 
          echo "EOF" >> $GITHUB_ENV

          rm update.log

      - name: Write PR body template
        uses: https://github.com/DamianReeves/write-file-action@v1.3
        with:
          path: pr_body.template
          contents: |
            automatically updated:

            ```
            ${{ env.UPDATE_LOG }}
            ```

      - name: Generate PR body
        uses: pedrolamas/handlebars-action@v2.4.0 # v2.4.0
        with:
          files: "pr_body.template"
          output-filename: "pr_body.md"
      - name: Save PR body
        id: pr_body
        uses: juliangruber/read-file-action@v1
        with:
          path: "pr_body.md"

      - name: Remove temporary files
        run: |
          rm pr_body.template

      - name: Create Pull Request
        id: create-pull-request
        uses: maxking/forgejo-create-pr@main
        with:
          token: ${{ secrets.FJ_TOKEN }}
          commit-user: crystals forgejo actions runner
          commit-email: runner@git.iw2tryhard.dev
          pr-branch: update-flake
          pr-title: 'chore: Update flake (automated)'
          pr-body: ${{ steps.pr_body.outputs.content }}
          pr-automerge: true
          delete-branch: true
          commit-message: $( cat pr-body.md )

      - name: Remove temporary files
        run: |
          rm pr_body.md
