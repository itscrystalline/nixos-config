name: Update flake inputs

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: Update flake
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Nix
      uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-25.11
        extra_nix_config: |
          extra-substituters = http://cache.crys
          extra-trusted-public-keys = mingzhu:V0KsUipFnrBNsfUD8VI0rFXQpgE3KKJfRby9Jm8cLTQ=
          connect-timeout = 30
          stall-timeout = 600
          fallback = true

    - name: Update
      run: |
        nix flake update 2>&1

    - name: Check
      run: |
        nix flake check --all-systems 2>&1

    - name: Commit
      uses: EndBug/add-and-commit@v9
      with:
        default_author: github_actions
        push: true
        message: 'chore: update flake (automated)'

