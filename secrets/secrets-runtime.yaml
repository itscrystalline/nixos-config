# Runtime secrets managed by sops-nix.
# These are decrypted onto the host at activation time into /run/secrets/
# and are NOT embedded in the Nix store.
#
# IMPORTANT: encrypt this file before committing:
#   sops --encrypt --in-place secrets/secrets-runtime.yaml
#
# Populate .sops.yaml with your age public keys first.

# ── User ──────────────────────────────────────────────────────────────────────
# Hashed password; produce with: mkpasswd -m sha-512
crystal-password: ""

# ── Services ──────────────────────────────────────────────────────────────────
# Full JSON content of the Cloudflare tunnel credentials file.
cloudflared-credentials: ""

# Nextcloud admin account password.
nextcloud-admin-password: ""

# Nextcloud serverinfo API token (read-only stats token).
nextcloud-admin-stats-token: ""

# Mail account password (used by msmtp passwordeval).
mail-password: ""

# Plain passphrase for the create_ap Wi-Fi hotspot on the HA host.
# (Injected into the create_ap config at service start; not an NM profile.)
homeassistant-wifi-password: ""

# ── Wi-Fi credentials ─────────────────────────────────────────────────────────
# Shell environment file consumed by
# networking.networkmanager.ensureProfiles.environmentFiles.
# Variables here are substituted into $VAR placeholders in known-networks
# profile definitions.  Three authentication types are supported:
#
#   Open network — no variables needed; omit wifi-security section in profile.
#
#   WPA-PSK — one variable per network:
#     <ssid>_PSK=passphrase
#     Profile: wifi-security.psk = "$<ssid>_PSK"
#
#   WPA-EAP / PEAP / MSCHAPv2 — two variables per network:
#     <ssid>_IDENTITY=username
#     <ssid>_PASSWORD=password
#     Profile: 802-1x.identity = "$<ssid>_IDENTITY"
#              802-1x.password = "$<ssid>_PASSWORD"
#
# Variable naming convention: replace hyphens and spaces in the SSID with
# underscores, preserving original capitalization.
#
# Networks in use:
#   santhad                    – WPA-PSK (home)
#   santhad_5G                 – WPA-PSK (home, 5 GHz)
#   KMITL-HiSpeed              – WPA-EAP / PEAP / MSCHAPv2 (university)
#   cwystaw the neko :3 ^w^    – WPA-PSK
#   dormpi                     – WPA-PSK (dormitory)
wifi-passwords: |
  santhad_PSK=
  santhad_5G_PSK=
  KMITL_HiSpeed_IDENTITY=
  KMITL_HiSpeed_PASSWORD=
  cwystaw_the_neko_PSK=
  dormpi_PSK=
