# Runtime secrets managed by sops-nix.
# These are decrypted onto the host at activation time into /run/secrets/
# and are NOT embedded in the Nix store.
#
# IMPORTANT: encrypt this file before committing:
#   sops --encrypt --in-place secrets/secrets-runtime.yaml
#
# Populate .sops.yaml with your age public keys first.
#
# Field notes:
#   crystal_password  – hashed password, produce with: mkpasswd -m sha-512
#   cloudflared_credentials – full JSON content of the tunnel credentials file
#   homeassistant_wifi_password – passphrase for the create_ap hotspot (plain string,
#     injected into create_ap config at service start; NOT a NM keyfile)
#
#   wifi_* – full NetworkManager keyfile content for each WiFi profile the host
#     connects to as a client. Written to /etc/NetworkManager/system-connections/.
#     Example format (adapt SSID, PSK, etc.):
#       [connection]
#       id=santhad
#       type=wifi
#       autoconnect=true
#       [wifi]
#       mode=infrastructure
#       ssid=santhad
#       [wifi-security]
#       key-mgmt=wpa-psk
#       psk=YOUR_PASSPHRASE
#       [ipv4]
#       method=auto
#       [ipv6]
#       method=auto
#       addr-gen-mode=stable-privacy
crystal_password: ""
homeassistant_wifi_password: ""
nextcloud_admin_password: ""
nextcloud_admin_stats_token: ""
mail_password: ""
cloudflared_credentials: ""
wifi_santhad: ""
wifi_santhad_5g: ""
wifi_kmitl_hispeed: ""
wifi_cwystaw: ""
wifi_dormpi: ""
