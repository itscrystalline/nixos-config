# Runtime secrets managed by sops-nix.
# These are decrypted onto the host at activation time into /run/secrets/
# and are NOT embedded in the Nix store.
#
# IMPORTANT: encrypt this file before committing:
#   sops --encrypt --in-place secrets/secrets-runtime.yaml
#
# Populate .sops.yaml with your age public keys first.
#
# Field notes:
#   crystal-password  – hashed password, produce with: mkpasswd -m sha-512
#   cloudflared-credentials – full JSON content of the tunnel credentials file
#   homeassistant-wifi-password – plain passphrase for the create_ap hotspot
#     (injected into create_ap config at service start; NOT an NM profile)
#
#   wifi-passwords – shell env file with PSK variables for NM ensureProfiles.
#     Each known-networks profile that needs a password should set
#     e.g. wifi-security.psk = "$SANTHAD_PSK" in secrets.nix, then list
#     the matching variable here.  Example:
#       SANTHAD_PSK=my-passphrase
#       SANTHAD_5G_PSK=my-5g-passphrase
#       KMITL_PSK=kmitl-passphrase
#       CWYSTAW_PSK=cwystaw-passphrase
#       DORMPI_PSK=dormpi-passphrase
crystal-password: ""
homeassistant-wifi-password: ""
nextcloud-admin-password: ""
nextcloud-admin-stats-token: ""
mail-password: ""
cloudflared-credentials: ""
wifi-passwords: ""
